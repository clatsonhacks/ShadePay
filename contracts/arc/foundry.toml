[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]
fs_permissions = [{ access = "read", path = "./test" }, { access = "read", path = "./out" }]

[rpc_endpoints]
arc = "${ARC_RPC_URL}"
anvil = "http://127.0.0.1:8545"
